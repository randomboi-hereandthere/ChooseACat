<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChooseACat</title>
</head>
<body>
    <div id = "homescreen"> 
        <img src="Cat_banner.png " 
        style="
            height: auto;
            width: 80%;
            display: block;
            margin-left: auto; 
            margin-right: auto;"
        >
    
        <h1 style="color: white; font-size: 80px;">How to play:</h1>
        <p style="color: white; font-size: 30px;">
            Decide which cat is cuter <br>
            and click it!
        </p>
        <br>
    
        <button id="start_button" type="button">
            Click here to play
        </button>
    </div>

<div id = "game_menu">
    <div id="winnerLeft">
        <p>Left wins!</p>
    </div>
    <div id="winnerRight">
        <p>Right wins!</p>
    </div>
    <img id="random_image1" src="" alt="Random image 1" style="cursor: pointer;">
    <img id="random_image2" src="" alt="Random image 2" style="cursor: pointer;">
</div>

<div id = "thankYou">
    <h1 style="color: white;">
        Thank you for playing my website!
    </h1>
</div>

<script src="script.js"></script>
</body>
</html>
